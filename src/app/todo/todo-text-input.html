<div class="todo-text-input" [class.todo-text-input--disabled]="disabled">
  <input
    #textInput
    [id]="id()"
    type="text"
    class="todo-text-input__control"
    [class.todo-text-input__control--keyboard-focused]="isKeyboardFocused()"
    [value]="value"
    [placeholder]="placeholder()"
    [autocomplete]="autocomplete()"
    [disabled]="disabled"
    (mousedown)="onMouseDown()"
    (focus)="onFocus()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <label class="todo-text-input__label" [for]="id()">{{ label() }}</label>
  <span class="todo-text-input__underline"></span>
</div>
