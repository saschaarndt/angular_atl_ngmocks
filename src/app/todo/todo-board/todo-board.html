<div class="board">
  <header class="board__header" role="banner">
    <span class="board__brand" aria-label="Meine Aufgaben">
      <span class="board__logo-tile" aria-hidden="true">
        <fa-icon class="board__logo-icon" [icon]="logoIcon" />
      </span>
      <span class="board__title">Meine Aufgaben</span>
    </span>
    <span class="board__claim">Damit ich es nicht im Kopf haben muss.</span>
  </header>

  <main class="board__main">
    <app-todo-sidebar
      [lists]="lists()"
      [activeListId]="activeListId()"
      [form]="form"
      [plusIcon]="plusIcon"
      [closeIcon]="closeIcon"
      (listSelected)="switchList($event)"
      (listRemoved)="removeList($event)"
      (listAdded)="addList()"
    />

    @if (activeList()) {
      <app-todo-card [listId]="activeListId()" [listName]="activeList()?.name" />
    }
  </main>

  <footer class="board__footer"></footer>
</div>
